image: python:3.9

cache:
  key: '$CI_COMMIT_REF_NAME'
  paths:
    - .venv/
    - __pycache__/

stages:
  - check
  - build
  - test
  - package
  - release
  - deploy

before_script:
  - python -m venv .venv
  - source .venv/bin/activate
  - pip install -U pip
  - pip install -r requirements.txt

lint:
  stage: check
  script:
    - pip install pylint
    - pylint --fail-under=4.0 apps/

build:
  stage: build
  script:
    - echo "No build step for Flask app"

test:
  stage: test
  script:
    - pip install pytest
    - pytest

package:
  stage: package
  script:
    - echo "No packaging step for Flask app"

release:
  stage: release
  script:
    - echo "No release step for Flask app"

deploy-dev:
  image: python:3.9
  stage: deploy
  when: on_success
  resource_group: deployment
  variables:
    URL: '${CI_PROJECT_NAME}.bham.team'
    # ACME test SSL certificate retrieval - VM must be public, have ports 80, 443 open, and have the Caddy web server enabled
    ACME: 'https://acme-staging-v02.api.letsencrypt.org/directory'
  before_script:
    # Ensure SSH key permissions are set correctly
    - chmod 600 $RSA
    # Activate the virtual environment and install Python dependencies
    - cd ~/team-project  # Assuming the project is located in this directory
    - source .venv/bin/activate
    - pip install -U pip
    - pip install -r requirements.txt
    # Run deployment script directly on the VM
    - sh team-project/install-app.sh
  script:
    # Change directory to your project directory
    - cd ~/team-project
    # Activate the virtual environment
    - source .venv/bin/activate
    # Run the Flask application
    - python run.py



